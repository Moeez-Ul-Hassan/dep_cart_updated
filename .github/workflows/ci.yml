name: Enterprise Cart CI Pipeline

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We match this to your local Python 3.12 environment
        python-version: ["3.12"]

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest Suite
      # PYTHONPATH ensures Pytest can find your 'app' folder in the cloud
      env:
        PYTHONPATH: . 
      run: |
        pytest -v
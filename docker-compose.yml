services:
  db:
    image: mysql:8.0
    container_name: cart_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: enterprise_password
      MYSQL_DATABASE: cart_db
    ports:
      - "3306:3306"
    command: >
      --server-id=1
      --log-bin=/var/lib/mysql/mysql-bin.log
      --binlog-format=ROW
      --binlog-row-image=FULL
    volumes:
      - mysql_data:/var/lib/mysql

  # --- NEW CACHE SERVICE ---
  redis:
    image: redis:7.2-alpine
    container_name: cart_redis_cache
    ports:
      - "6379:6379"

volumes:
  mysql_data:
events {}

http {
    # 1. Listen on standard HTTP (Port 80) and force redirect to HTTPS
    server {
        listen 80;
        server_name cart-by-moeez.duckdns.org;
        
        # Allow Certbot to renew certificates automatically in the future
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Force all other traffic to upgrade to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Listen on secure HTTPS (Port 443)
    server {
        listen 443 ssl;
        server_name cart-by-moeez.duckdns.org;

        # Point Nginx to the certificates Certbot just created
        ssl_certificate /etc/letsencrypt/live/cart-by-moeez.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cart-by-moeez.duckdns.org/privkey.pem;

        # Send the secure, verified traffic backward to FastAPI
        location / {
            proxy_pass http://web_blue:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
version: '3.8'

services:
  web:
    image: moeezul/dep_cart_api:latest
    container_name: cart_fastapi_web
    ports:
      - "80:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: cart_redis_cache
    ports:
      - "6379:6379"
    restart: always
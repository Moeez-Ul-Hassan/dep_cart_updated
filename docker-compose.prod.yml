version: '3.8'

services:
  # --- THE BOUNCER (NGINX) ---
  nginx:
    image: nginx:latest
    container_name: cart_nginx
    ports:
      - "80:80"
      - "443:443" # NEW: Opening the secure port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt # NEW: Where Nginx reads the certs
      - ./certbot/www:/var/www/certbot  # NEW: Where Certbot proves you own the domain
    depends_on:
      - web_blue
      - web_green
    restart: always

  # --- THE CERTIFICATE MANAGER ---
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  web_blue:
    image: moeezul/dep_cart_api:latest
    container_name: cart_fastapi_blue
    env_file:
      - .env

  # --- THE GREEN ENGINE (Standby) ---
  web_green:
    image: moeezul/dep_cart_api:latest
    container_name: cart_fastapi_green
    env_file:
      - .env

  # --- THE CACHE (REDIS) ---
  redis:
    image: redis:7.2-alpine
    container_name: cart_redis_cache
    ports:
      - "6379:6379"
    restart: always
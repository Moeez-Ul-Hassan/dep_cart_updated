version: '3.8'

services:
  # --- THE BOUNCER (NGINX) ---
  nginx:
    image: nginx:latest
    container_name: cart_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: always

  # --- THE APPLICATION (FASTAPI) ---
  web:
    image: moeezul/dep_cart_api:latest
    container_name: cart_fastapi_web
    # NOTICE: We removed the "ports" section! It is now hidden from the public internet.
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  # --- THE CACHE (REDIS) ---
  redis:
    image: redis:7.2-alpine
    container_name: cart_redis_cache
    ports:
      - "6379:6379"
    restart: always